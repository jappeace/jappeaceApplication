<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="230"
   height="320"
   viewBox="0 0 230 320"
   version="1.1">
  <g transform="translate(15,40)">
    <!-- Megaphone bell/cone -->
    <path
       d="M 30,100 L 30,160 L 80,160 L 160,220 L 160,40 L 80,100 Z"
       style="fill:none;stroke:#000000;stroke-width:10;stroke-linejoin:round;stroke-linecap:round" />
    <!-- Megaphone mouth opening -->
    <path
       d="M 160,40 C 190,40 200,70 200,130 C 200,190 190,220 160,220"
       style="fill:none;stroke:#000000;stroke-width:10;stroke-linecap:round" />
    <!-- Sound waves -->
    <path
       d="M 175,80 C 185,100 185,160 175,180"
       style="fill:none;stroke:#000000;stroke-width:7;stroke-linecap:round" />
    <!-- Handle/grip at bottom -->
    <path
       d="M 45,160 L 45,200 C 45,215 55,225 70,225 L 70,160"
       style="fill:none;stroke:#000000;stroke-width:10;stroke-linejoin:round;stroke-linecap:round" />
  </g>
</svg>
